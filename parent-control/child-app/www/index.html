<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>System Manager</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: linear-gradient(160deg, #0f2027, #203a43, #2c5364);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    }
    .card {
      text-align: center;
      padding: 48px 32px;
      max-width: 320px;
      width: 100%;
    }
    .shield { font-size: 72px; margin-bottom: 20px; display: block; }
    .name {
      font-size: 22px;
      font-weight: 700;
      color: #ecf0f1;
      letter-spacing: 1px;
      margin-bottom: 6px;
    }
    .tag {
      font-size: 11px;
      color: #3498db;
      letter-spacing: 3px;
      text-transform: uppercase;
      margin-bottom: 52px;
    }
    .quote {
      font-size: 15px;
      font-style: italic;
      color: #b2bec3;
      line-height: 1.8;
      margin-bottom: 14px;
    }
    .author { font-size: 12px; color: #636e72; }
  </style>
</head>
<body>
  <div class="card">
    <span class="shield">🛡️</span>
    <div class="name">System Manager</div>
    <div class="tag">Protection Active</div>
    <div class="quote">"The secret of getting ahead<br>is getting started."</div>
    <div class="author">— Mark Twain</div>
  </div>
  <script src="app.js"></script>
</body>
</html>
